name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - name: Lint Go
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11.4

      - name: Lint Frontend
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - name: Test Go
        run: go test ./...

      - name: Test Frontend
        run: npm test

  lint-and-test:
    needs: [lint, test]
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - run: echo "lint + test succeeded"
